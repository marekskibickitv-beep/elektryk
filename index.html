<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Dowodzenia Marka</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #0d1117; color: #c9d1d9; display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 280px; background: #161b22; border-right: 1px solid #30363d; padding: 20px; }
        .sidebar h2 { color: #fff; margin-bottom: 20px; text-align: center; }
        .menu-btn { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; text-align: left; cursor: pointer; margin-bottom: 8px; border-radius: 6px; transition: 0.2s; }
        .menu-btn:hover { background: #21262d; border-color: #58a6ff; }
        .menu-btn.active { background: #1f6feb; border-color: #1f6feb; color: white; }

        /* Treść */
        .main-content { flex: 1; padding: 40px; }
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 8px; }
        
        .input-dark { padding: 10px; background: #0d1117; color: #fff; border: 1px solid #30363d; border-radius: 6px; width: 100%; margin-bottom: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-action { background: #238636; color: white; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Marek Panel</h2>
        <button class="menu-btn active" onclick="switchTab('dom')">🏠 Dom</button>
        <button class="menu-btn" onclick="switchTab('mojelinki')">🔗 Moje Linki</button>
        <button class="menu-btn" onclick="switchTab('ai-asystent')">🤖 AI Asystent</button>
        <button class="menu-btn" onclick="switchTab('kierownik')" style="border-color: #ff7b72; color: #ff7b72;">⚠️ Sektor Zastrzeżony</button>
    </div>

    <div class="main-content">
        <div id="dom" class="tab-content active"><h1>Pulpit Główny</h1><p>System operacyjny w gotowości.</p></div>
        
        <div id="mojelinki" class="tab-content">
            <h1>Moje Linki</h1>
            <div class="card">Tu znajdują się Twoje prywatne zakładki.</div>
        </div>
        
        <div id="ai-asystent" class="tab-content">
            <h1>🤖 Asystent AI</h1>
            <div class="card">
                <textarea id="aiInput" class="input-dark" rows="3" placeholder="Zadaj techniczne pytanie..."></textarea>
                <button class="btn btn-action" onclick="pytajAI()">ZAPYTAJ AI</button>
                <div id="aiResponse" style="margin-top: 20px; color: #58a6ff;"></div>
            </div>
        </div>

        <div id="kierownik" class="tab-content"><h1>Sektor Zastrzeżony</h1><div class="card">Dane tajne dostępne.</div></div>
    </div>

    <div id="passwordModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; justify-content:center; align-items:center;">
        <div style="background:#161b22; padding:30px; border:1px solid #30363d; border-radius:8px; text-align:center;">
            <h3 style="color:#fff; margin-bottom:15px;">PODAJ HASŁO</h3>
            <input type="password" id="passInput" class="input-dark">
            <button class="btn btn-action" onclick="checkPassword()">AUTORYZUJ</button>
        </div>
    </div>

    <script>
        let currentTab = "";

        function switchTab(tabId) {
            if (tabId === 'kierownik' || tabId === 'mojelinki') {
                currentTab = tabId;
                document.getElementById('passwordModal').style.display = 'flex';
                document.getElementById('passInput').focus();
                return;
            }
            showTab(tabId);
        }

        function checkPassword() {
            const input = document.getElementById('passInput').value;
            // Hasła: Sektor = kierownik2026, Linki = marek1901
            if ((currentTab === 'kierownik' && input === 'kierownik2026') || 
                (currentTab === 'mojelinki' && input === 'marek1901')) {
                document.getElementById('passwordModal').style.display = 'none';
                document.getElementById('passInput').value = "";
                showTab(currentTab);
            } else { alert("❌ BŁĘDNE HASŁO"); }
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function pytajAI() {
            const res = document.getElementById('aiResponse');
            res.innerText = "Analizuję...";
            setTimeout(() => { res.innerHTML = "<strong>AI:</strong> System jest w trybie gotowości."; }, 1000);
        }
    </script>
</body>
</html>
