<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Dowodzenia</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #0d1117; color: #c9d1d9; display: flex; min-height: 100vh; }
        
        .sidebar { width: 280px; background: #161b22; border-right: 1px solid #30363d; padding: 20px; }
        .menu-btn { width: 100%; padding: 12px; background: transparent; border: 1px solid transparent; border-radius: 6px; color: #c9d1d9; text-align: left; cursor: pointer; margin-bottom: 5px; }
        .menu-btn.active { background: #1f6feb; color: white; }
        
        .main-content { flex: 1; padding: 40px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .input-dark { padding: 10px; background: #0d1117; color: #fff; border: 1px solid #30363d; border-radius: 6px; width: 100%; margin-bottom: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; color: white; }
        .btn-action { background: #238636; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Marek</h2>
        <div class="menu-nav">
            <button class="menu-btn active" onclick="switchTab('dom')">🏠 Dom</button>
            <button class="menu-btn" onclick="switchTab('mojelinki')">🔗 Moje Linki</button>
            <button class="menu-btn" onclick="switchTab('ai-asystent')">🤖 AI Asystent</button>
            <button class="menu-btn" onclick="switchTab('kierownik')" style="color: #ff7b72;">⚠️ Sektor Zastrzeżony</button>
        </div>
    </div>

    <div class="main-content">
        <div id="dom" class="tab-content active"><h1>Pulpit Główny</h1></div>
        <div id="mojelinki" class="tab-content"><h1>Moje Linki</h1><div class="card">Tu są Twoje prywatne linki.</div></div>
        
        <div id="ai-asystent" class="tab-content">
            <h1>🤖 Asystent Techniczny AI</h1>
            <div class="card">
                <textarea id="aiInput" class="input-dark" rows="3" placeholder="O co chcesz zapytać?"></textarea>
                <button class="btn btn-action" onclick="pytajAI()">ZAPYTAJ AI</button>
                <div id="aiResponse" style="margin-top: 20px; color: #58a6ff;"></div>
            </div>
        </div>

        <div id="kierownik" class="tab-content"><h1>Sektor Zastrzeżony</h1><div class="card">Dostęp autoryzowany.</div></div>
    </div>

    <div id="passwordModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; justify-content:center; align-items:center;">
        <div style="background:#161b22; padding:30px; border:1px solid #30363d; border-radius:8px; text-align:center;">
            <h3 style="color:#f0f6fc; margin-bottom:15px;">PODAJ HASŁO:</h3>
            <input type="password" id="passInput" class="input-dark">
            <button class="btn btn-action" onclick="checkPassword()">ZATWIERDŹ</button>
        </div>
    </div>

    <script>
        let currentTab = "";

        function switchTab(tabId) {
            if (tabId === 'kierownik' || tabId === 'mojelinki') {
                currentTab = tabId;
                document.getElementById('passwordModal').style.display = 'flex';
                document.getElementById('passInput').focus();
                return;
            }
            executeSwitch(tabId);
        }

        function checkPassword() {
            const input = document.getElementById('passInput').value;
            // Hasła: Sektor = kierownik2026, Linki = marek1901
            if ((currentTab === 'kierownik' && input === 'kierownik2026') || 
                (currentTab === 'mojelinki' && input === 'marek1901')) {
                document.getElementById('passwordModal').style.display = 'none';
                document.getElementById('passInput').value = "";
                executeSwitch(currentTab);
            } else { alert("❌ BŁĘDNE HASŁO"); }
        }

        function executeSwitch(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            const btns = document.querySelectorAll('.menu-btn');
            btns.forEach(b => { if(b.getAttribute('onclick').includes(tabId)) b.classList.add('active'); });
        }

        function pytajAI() {
            const responseDiv = document.getElementById('aiResponse');
            responseDiv.innerText = "Analizuję bazę danych...";
            setTimeout(() => { responseDiv.innerHTML = "<strong>Odpowiedź AI:</strong> System gotowy do pracy."; }, 1000);
        }
    </script>
</body>
</html>
